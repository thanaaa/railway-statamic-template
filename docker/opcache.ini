; docker/opcache.ini

[opcache]
opcache.enable=1
; Enable OPcache for CLI too. Artisan commands (config:cache, stache:warm, etc.)
; run faster because they reuse compiled bytecode instead of re-parsing PHP files.
opcache.enable_cli=1

; ── Memory ────────────────────────────────────────────────────────────────────
; 64 MB covers the compiled bytecode for Statamic + Laravel + vendor (~5,000 files).
; Going higher on a 512 MB Railway container wastes RAM needed for php-fpm workers.
opcache.memory_consumption=64

; Interned strings (class names, function names, literals). 16 MB is safe for
; a typical Laravel/Statamic application.
opcache.interned_strings_buffer=16

; Must exceed your actual PHP file count.
; `find /var/www/html -name "*.php" | wc -l` on a blank Statamic install: ~4,500.
; 8192 gives comfortable headroom for future packages.
opcache.max_accelerated_files=8192

; ── Revalidation ──────────────────────────────────────────────────────────────
; In a Docker container, application code only changes on new image deploy.
; Setting this to 0 disables the stat() syscall on every OPcache hit — measurable
; throughput gain on shared CPU. Safe because we can't edit files in-place.
opcache.validate_timestamps=0

; ── PHP Attributes ────────────────────────────────────────────────────────────
; Required for PHP 8.x #[Attribute] annotations (used in Laravel route attributes).
; Stripping comments breaks attribute discovery.
opcache.save_comments=1

; ── JIT ───────────────────────────────────────────────────────────────────────
; JIT is disabled for Statamic/Laravel. This is an I/O-bound application:
; bottlenecks are filesystem reads (YAML/Markdown), cache reads, and HTTP overhead.
; JIT optimizes CPU loops — no measurable gain here, and there are confirmed
; crash bugs with JIT + opcache.file_cache in some package combinations.
opcache.jit=disable
opcache.jit_buffer_size=0

; ── Miscellaneous ─────────────────────────────────────────────────────────────
opcache.fast_shutdown=1
opcache.max_file_size=0
