; docker/php-fpm-pool.conf

[www]
user = www-data
group = www-data

; Use /run/ (FHS tmpfs) not /tmp/ for the Unix socket.
; /run is always in-memory on Alpine, correct for IPC sockets.
listen = /run/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; ── Process management ────────────────────────────────────────────────────────
; pm=dynamic scales workers up under load and releases memory when idle.
; On a Railway Hobby plan (512 MB RAM):
;   512 MB total
;   -  40 MB  nginx + supervisord + OS
;   -  64 MB  OPcache memory (from opcache.ini)
;   -  50 MB  headroom
;   = ~358 MB available for php-fpm workers
;   Each worker: ~40 MB average RSS with OPcache active
;   358 / 40 = ~8 workers max, use 6 for safety margin.
pm = dynamic
pm.max_children = 6
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 2

; Recycle workers after 500 requests to prevent slow memory leaks from
; Statamic loading YAML content into long-lived worker processes.
pm.max_requests = 500

; Free idle workers after 10 seconds. Low-traffic CMS benefits from releasing
; memory when idle rather than keeping spare workers parked.
pm.process_idle_timeout = 10s

; ── Environment ──────────────────────────────────────────────────────────────
; CRITICAL: By default, PHP-FPM clears the worker's inherited environment vars.
; Without this, Railway's APP_KEY, APP_URL, DB_*, REDIS_*, etc. are all invisible
; to PHP via env() / getenv(). The entire Laravel config system breaks silently.
clear_env = no

; ── Logging ───────────────────────────────────────────────────────────────────
; Flag any request taking > 5 seconds (flat-file CMS: likely uncached stache
; traversal or Markdown rendering on a large collection).
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s
catch_workers_output = yes
; Prevent PHP-FPM from adding timestamp/PID prefix decorations to worker output.
; Clean output is required for Railway's structured log aggregation.
decorate_workers_output = no
